
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <script src="https://cdn.img.ly/packages/imgly/cesdk-js/1.72.1/cesdk.umd.js"></script>
    </head>
    <body>
        <div id="cesdk_container" style="width: 100vw; height: 100vh;"></div>
        <script>
            async function extractScene() {
                try {
                    let config = {
                        baseURL: 'https://cdn.img.ly/packages/imgly/cesdk-js/1.72.1/assets'
                    };
                    const container = document.getElementById('cesdk_container');
                    const cesdk = await window.CreativeEditorSDK.create(container, config);
                    const engine = cesdk.engine;
                    
                    const scene = engine.scene.create();
                    const page = engine.block.create('page');
                    const text = engine.block.create('text');
                    engine.block.appendChild(scene, page);
                    engine.block.appendChild(page, text);
                    
                    const base64Str = await engine.scene.saveToString();
                    document.title = "SCENE_READY";
                    
                    window.__SCENE_B64__ = base64Str;
                } catch(e) {
                    console.error("Engine Error", e);
                    document.title = "SCENE_ERROR";
                    window.__SCENE_ERROR__ = e.message;
                }
            }
            extractScene();
        </script>
    </body>
    </html>
